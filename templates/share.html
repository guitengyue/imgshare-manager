<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ item.filename }} - Aguihome 图床</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f1ea;
      --card: #fffaf2;
      --ink: #1e2a2f;
      --muted: #66757d;
      --line: #d8cdb8;
      --accent: #d5662f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Georgia, "Noto Serif SC", serif;
      background: linear-gradient(180deg, #f8f4ec 0%, var(--bg) 100%);
      color: var(--ink);
    }
    .wrap {
      max-width: 1080px;
      margin: 32px auto;
      padding: 0 18px;
    }
    .head {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: end;
      margin-bottom: 18px;
    }
    h1 {
      margin: 0;
      font-size: clamp(22px, 4vw, 34px);
      word-break: break-word;
    }
    .meta {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
      white-space: nowrap;
    }
    .image {
      border: 1px solid var(--line);
      background: var(--card);
      border-radius: 8px;
      overflow: hidden;
      text-align: center;
    }
    .image img {
      display: block;
      max-width: 100%;
      height: auto;
      margin: 0 auto;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }
    a, button {
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #efe4d0;
      color: var(--ink);
      padding: 10px 14px;
      font: inherit;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
    }
    button {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    @media (max-width: 640px) {
      .head {
        align-items: start;
        flex-direction: column;
      }
      .meta {
        white-space: normal;
      }
      a, button {
        width: 100%;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="head">
      <div>
        <h1>{{ item.filename }}</h1>
        <div class="meta">{{ item.topic }} · {{ item.size | filesizeformat }} · {{ item.created_at }}</div>
      </div>
      <div class="meta">到期：{{ item.expiration_at }}</div>
    </div>
    <div class="image">
      {% if item.is_image %}
      <img src="{{ item.file_url }}" alt="{{ item.filename }}">
      {% else %}
      <p>这个文件无法预览。</p>
      {% endif %}
    </div>
    <div class="actions">
      <a href="{{ item.file_url }}" target="_blank" rel="noreferrer">打开原图</a>
      <button type="button" data-copy="{{ request.url_root[:-1] }}{{ item.file_url }}">复制图片直链</button>
    </div>
  </main>
  <script>
    document.querySelectorAll("[data-copy]").forEach((node) => {
      node.addEventListener("click", async () => {
        const original = node.textContent;
        await navigator.clipboard.writeText(node.dataset.copy);
        node.textContent = "已复制";
        setTimeout(() => {
          node.textContent = original;
        }, 1200);
      });
    });
  </script>
</body>
</html>
